<main class="feature-page">
  <section class="feature-header">
    <span>Reportes</span>
    <h1>Reportes financieros</h1>
    <p>Genera y descarga informacion consolidada para seguimiento y auditoria.</p>
  </section>

  <section class="feature-grid">
    @for (report of reports(); track report.name) {
      <article class="feature-card">
        <small>{{ report.format }}</small>
        <h2>{{ report.name }}</h2>
        <p>{{ report.period }}</p>
      </article>
    }
  </section>
</main>
